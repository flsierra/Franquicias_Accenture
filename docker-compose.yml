services:
  app:
    build:
      context: .
      dockerfile: DockerFile
    container_name: franquicias-api
    ports:
      - "8080:8080"
    environment:
      SPRING_R2DBC_URL: ${DB_URL}
      SPRING_R2DBC_USERNAME: ${DB_USERNAME}
      SPRING_R2DBC_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
